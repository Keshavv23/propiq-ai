version: "3.9"

services:

  # ── Redis ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: propiq_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── FastAPI Backend ────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: propiq_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - CHROMA_PERSIST_PATH=/app/chroma_store
    volumes:
      - chroma_data:/app/chroma_store
      - ./app:/app/app
      - ./rag_pipeline:/app/rag_pipeline
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── Next.js Frontend ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: propiq_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
    depends_on:
      - backend
    restart: unless-stopped

  # ── Nginx Reverse Proxy ────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: propiq_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  redis_data:
  chroma_data:
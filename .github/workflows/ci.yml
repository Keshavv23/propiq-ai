name: PropIQ AI CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backend health check
        run: |
          python -c "from app.config import Settings; print('Config OK')"
          python -c "from app.models.orm import Agency, Listing, Lead; print('Models OK')"
          python -c "from app.services.ai_agent import PropIQAgent; print('Agent OK')"

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Type check
        working-directory: ./frontend
        run: npx tsc --noEmit

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t propiq-backend .

      - name: Build frontend image
        run: docker build -t propiq-frontend ./frontend

      - name: Test docker-compose config
        run: docker compose config